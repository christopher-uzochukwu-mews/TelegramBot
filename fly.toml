# Fly.io app config for MBA Telegram Bot
# Deploy: fly deploy
# Set secrets first: fly secrets set TELEGRAM_BOT_TOKEN=your_token

app = "mba-telegram-bot"

[build]
  dockerfile = "Dockerfile"

[env]
  TZ = "America/Vancouver"
  HEALTH_CHECK_PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[vm]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
