services:
  mba-bot:
    build: .
    container_name: mba-telegram-bot
    env_file: .env
    environment:
      - TZ=America/Vancouver   # reminder time is in Vancouver/BC (e.g. 20:00 = 8pm Pacific)
    restart: unless-stopped
    ports:
      - "8080:8080"  # health check: GET http://localhost:8080/health
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
